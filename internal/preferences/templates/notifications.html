<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <p class="eyebrow">Email Updates</p>
      <h1>How results should reach you</h1>
      <p class="subtitle">Clearer language than “digest”, while still matching the app’s real behavior.</p>
    </div>
  </header>

  <nav class="nav-shell">
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link" href="/settings/profile">Profile</a>
    <a class="nav-link is-active" href="/settings/digest">Email Updates</a>
  </nav>

  <main class="page-shell">
    {{if .Flash}}<div class="flash">{{.Flash}}</div>{{end}}
    {{if .Warnings}}
      <section class="panel panel-warning">
        <h2>Attention</h2>
        <ul class="warning-list">
          {{range .Warnings}}<li>{{.}}</li>{{end}}
        </ul>
      </section>
    {{end}}

    <section class="panel">
      <form class="form-grid" method="post" action="/settings/digest">
        <label class="field field-inline">
          <input type="checkbox" name="email_updates_enabled" {{if .State.DigestEnabled}}checked{{end}}>
          <div>
            <span class="inline-label">Send me email updates after each scheduled run</span>
            <small>If no new jobs are found, the app still sends a status email so you know it ran successfully.</small>
          </div>
        </label>

        <label class="field field-wide">
          <span>Where should updates go?</span>
          <small>Example: francis@example.com</small>
          <input type="email" name="email_destination" value="{{.State.DigestRecipient}}">
        </label>

        <label class="field">
          <span>How many roles should each email include?</span>
          <small>Example: 10</small>
          <select name="email_top_n">
            <option value="5" {{if eq .State.DigestTopN 5}}selected{{end}}>5</option>
            <option value="10" {{if eq .State.DigestTopN 10}}selected{{end}}>10</option>
            <option value="15" {{if eq .State.DigestTopN 15}}selected{{end}}>15</option>
          </select>
        </label>

        <label class="field">
          <span>How far back should we look?</span>
          <small>Keep this simple for now.</small>
          <select name="email_lookback">
            {{range .DigestLookbackOptions}}
              <option value="{{.Value}}" {{if eq (lookbackValue $.State.DigestLookback) .Value}}selected{{end}}>{{.Label}}</option>
            {{end}}
          </select>
        </label>

        <div class="form-actions">
          <button class="button button-primary" type="submit">Save settings</button>
          <button class="button button-danger" type="submit" formaction="/settings/digest/reset" formmethod="post">Clear email settings</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
